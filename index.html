		<title>World of Tales</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

html, body {
	width: 100%;
	height: 100%;
	/* Dynamic viewport units track mobile browser toolbars as they hide and
	   show — plain 100% lags on Chrome/Safari mobile and leaves the bottom
	   of the game cut off under the toolbar. */
	width: 100dvw;
	height: 100dvh;
	/* Pin the page: iPad Safari must never scroll, bounce or zoom the game.
	   A rubber-band scroll or a pinch-zoom leaves the canvas shifted with
	   content "past the edge" of the screen. */
	position: fixed;
	inset: 0;
	overflow: hidden;
	overscroll-behavior: none;
}

body {
	color: white;
	background-color: #1b3d16;
	overflow: hidden;
	touch-action: none;
	font-family: 'Trebuchet MS', 'Segoe UI', Verdana, sans-serif;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
}

/* Publish the hardware safe-area (notches, camera cutouts, home indicator)
   where the game can read it: the engine renders full-bleed and shifts its
   own UI inward by these amounts. */
:root {
	--sai-t: env(safe-area-inset-top, 0px);
	--sai-r: env(safe-area-inset-right, 0px);
	--sai-b: env(safe-area-inset-bottom, 0px);
	--sai-l: env(safe-area-inset-left, 0px);
}

#canvas:focus {
	outline: none;
}

#status, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status {
	top: 0;
	bottom: 0;
	background: #1b3d16 url('splash.jpg') center center / cover no-repeat;
	display: flex;
	flex-direction: column;
	justify-content: flex-start;
	align-items: center;
	padding-top: 6vh;
	box-sizing: border-box;
	visibility: hidden;
}

#status::before {
	content: '';
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	height: 50%;
	background: linear-gradient(180deg, rgba(18, 38, 14, 0.6) 0%, rgba(18, 38, 14, 0) 100%);
	pointer-events: none;
}

#wot-title {
	position: relative;
	z-index: 1;
	font-size: clamp(2.4rem, 8vw, 5.2rem);
	font-weight: 800;
	letter-spacing: 0.02em;
	color: #fff6e0;
	text-shadow: 0 2px 0 #7a4a18, 0 4px 2px rgba(60, 30, 5, 0.6), 0 6px 22px rgba(0, 0, 0, 0.55);
	margin: 0;
	text-align: center;
	animation: wot-bob 2.6s ease-in-out infinite;
}

#wot-tagline {
	position: relative;
	z-index: 1;
	margin-top: 0.5rem;
	font-size: clamp(0.95rem, 2.4vw, 1.35rem);
	font-weight: 600;
	color: #fff3d6;
	text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
	text-align: center;
}

#wot-loading {
	position: relative;
	z-index: 1;
	margin-top: 1.1rem;
	font-size: 1rem;
	color: #f0fae4;
	text-shadow: 0 2px 6px rgba(0, 0, 0, 0.55);
	letter-spacing: 0.06em;
}

@keyframes wot-bob {
	0%, 100% { transform: translateY(0); }
	50% { transform: translateY(-10px); }
}

#status-progress {
	bottom: 14%;
	width: 46%;
	max-width: 480px;
	height: 18px;
	margin: 0 auto;
	display: none;
	-webkit-appearance: none;
	appearance: none;
	border: none;
	border-radius: 10px;
	overflow: hidden;
	background-color: rgba(255, 255, 255, 0.18);
}

#status-progress::-webkit-progress-bar {
	background-color: rgba(255, 255, 255, 0.18);
	border-radius: 10px;
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #ffd166, #f4a259);
	border-radius: 10px;
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #ffd166, #f4a259);
	border-radius: 10px;
}

#status-notice {
	display: none;
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	line-height: 1.3;
	margin: 1rem 2rem 0;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

		<script>
			// iOS ignores user-scalable=no: block pinch-zoom gestures and keep
			// the page anchored at the origin, so the game can never end up
			// zoomed/panned with its right side cut off.
			["gesturestart", "gesturechange", "gestureend"].forEach(function(ev) {
				document.addEventListener(ev, function(e) { e.preventDefault(); }, { passive: false });
			});
			document.addEventListener("touchmove", function(e) {
				if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
			}, { passive: false });
			if (window.visualViewport) {
				// Toolbar show/hide and pinch recovery: re-anchor and tell the
				// engine to retake the real visible size.
				visualViewport.addEventListener("resize", function() {
					window.scrollTo(0, 0);
					window.dispatchEvent(new Event("resize"));
				});
			}
			// Safari can report a stale size mid-rotation; nudge a late resize.
			window.addEventListener("orientationchange", function() {
				setTimeout(function() { window.dispatchEvent(new Event("resize")); }, 350);
			});
			// Device diagnosis overlay: open the game with ?debug=1 and the
			// real numbers render in plain HTML, independent of the engine.
			if (location.search.indexOf("debug") !== -1) {
				var dbg = document.createElement("div");
				dbg.style.cssText = "position:fixed;top:4px;left:4px;z-index:99999;" +
					"background:rgba(0,0,0,0.75);color:#9f9;font:12px monospace;" +
					"padding:6px;pointer-events:none;white-space:pre;border-radius:4px";
				document.documentElement.appendChild(dbg);
				setInterval(function() {
					var c = document.getElementById("canvas");
					var r = c ? c.getBoundingClientRect() : {};
					var vv = window.visualViewport || {};
					dbg.textContent =
						"inner " + window.innerWidth + "x" + window.innerHeight + " dpr " + window.devicePixelRatio +
						"\nvv " + Math.round(vv.width || 0) + "x" + Math.round(vv.height || 0) +
						" scale " + (vv.scale || 1).toFixed(2) +
						" off " + Math.round(vv.offsetLeft || 0) + "," + Math.round(vv.offsetTop || 0) +
						"\ncanvas attr " + (c ? c.width + "x" + c.height : "?") +
						"\ncanvas rect " + Math.round(r.width || 0) + "x" + Math.round(r.height || 0) +
						" @" + Math.round(r.left || 0) + "," + Math.round(r.top || 0) +
						"\nscroll " + window.scrollX + "," + window.scrollY +
						"\nUA " + navigator.userAgent.slice(0, 60);
				}, 500);
			}
		</script>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<h1 id="wot-title">World of Tales</h1>
			<div id="wot-tagline">A magical adventure for ages 6+</div>
			<div id="wot-loading">Opening the storybook…</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":7473856,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}

		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');

				// worker takes over, and check for an update on every load.
				const hadController = !!navigator.serviceWorker.controller;

					if (hadController) { window.location.reload(); }
				});
				navigator.serviceWorker.getRegistration().then((r) => { if (r) { r.update(); } });
